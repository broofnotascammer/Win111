<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 11</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/apps.css">
<style>
  /* inline preview divs for wallpaper swatches in Settings */
  .wallpaper-bloom   { background: linear-gradient(135deg,#0a1628 0%,#1a3a5c 30%,#0d47a1 60%,#1565c0 80%,#283593 100%); }
  .wallpaper-sunrise { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 30%,#0f3460 55%,#533483 80%,#e94560 100%); }
  .wallpaper-forest  { background: linear-gradient(135deg,#0d1b0d 0%,#1a3d1a 35%,#2d6a2d 60%,#1a3d1a 80%,#0d1b0d 100%); }
  .wallpaper-sunset  { background: linear-gradient(135deg,#1a0a00 0%,#4a1500 25%,#9c3700 50%,#e05800 75%,#f59b00 100%); }
  .wallpaper-night   { background: radial-gradient(ellipse at center,#0a0a2e 0%,#000010 100%); }
  .wallpaper-purple  { background: linear-gradient(135deg,#0d0d2b 0%,#2d0a4e 35%,#5a0a82 60%,#8b0dc0 80%,#c020e0 100%); }
  .desktop-bg-preview { width:100%;height:100%; }
</style>
</head>
<body>

<!-- DESKTOP -->
<div id="desktop"
     oncontextmenu="desktopContextMenu(event)"
     onclick="closeAllMenus(event)">
  <div id="desktop-bg" class="wallpaper-bloom"></div>
  <div id="desktop-icons"></div>
</div>

<!-- TASKBAR -->
<div id="taskbar" onclick="event.stopPropagation()">
  <div id="taskbar-left"></div>
  <div id="taskbar-center">
    <div id="start-btn" onclick="toggleStartMenu(event)" title="Start">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
        <rect x="1"  y="1"  width="10" height="10" fill="#f35325"/>
        <rect x="13" y="1"  width="10" height="10" fill="#81bc06"/>
        <rect x="1"  y="13" width="10" height="10" fill="#05a6f0"/>
        <rect x="13" y="13" width="10" height="10" fill="#ffba08"/>
      </svg>
    </div>

    <!-- Search widget -->
    <div class="tb-btn" onclick="WM.open('browser')" title="Search" style="width:auto;padding:0 10px;gap:6px;background:rgba(255,255,255,.06);border-radius:20px;height:34px">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.8">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <span style="font-size:12px;color:rgba(255,255,255,.4)">Search</span>
    </div>

    <!-- Running apps -->
    <div id="taskbar-apps"></div>
  </div>

  <div id="taskbar-right">
    <!-- System tray -->
    <div id="tray-zone" style="display:flex;align-items:center;gap:2px" onclick="toggleQuickSettings(event)">
      <div class="tray-btn" title="Network">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2C4.7 2 2 4.7 2 8s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6zm-.5 9V9.5H6L8 7l2 2.5H8.5V11h-1z"/></svg>
      </div>
      <div class="tray-btn" title="Volume">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M9 3v10l-4-4H2V7h3l4-4zm2 2.5a4 4 0 010 5M13 4a7 7 0 010 8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tray-btn" title="Battery">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="4" width="12" height="8" rx="1.5"/>
          <rect x="2" y="5" width="8" height="6" rx=".5" fill="currentColor"/>
          <rect x="13.5" y="6" width="1.5" height="4" rx=".5" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <div class="tray-btn" id="tb-clock" onclick="WM.open('calendar')" style="flex-direction:column;align-items:flex-end;gap:0;padding:2px 8px;cursor:pointer"></div>

    <div class="tray-btn" onclick="showNotifCenter()" style="width:20px;justify-content:center">
      <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">
        <path d="M8 2a6 6 0 016 6v3l1 2H1l1-2V8a6 6 0 016-6zm0-2a2 2 0 012 2H6a2 2 0 012-2zm-1.5 14a1.5 1.5 0 003 0h-3z"/>
      </svg>
    </div>
  </div>
</div>

<!-- START MENU -->
<div id="start-menu" onclick="event.stopPropagation()">
  <div class="sm-search">
    <svg viewBox="0 0 24 24" width="16" height="16">${NAV_ICONS_INLINE.search}</svg>
    <input type="text" id="sm-search-input" placeholder="Search for apps, settings, and documents" oninput="filterStartApps(this.value)">
  </div>
  <div id="sm-pinned">
    <div class="sm-section-title">Pinned</div>
    <div id="sm-pinned-grid"></div>
  </div>
  <div id="sm-rec">
    <div class="sm-section-title">Recommended</div>
    <div id="sm-rec-list"></div>
  </div>
  <div id="sm-footer">
    <div id="sm-user" onclick="openSettings('accounts')">
      <div id="sm-user-avatar" style="background:#0078d4">U</div>
      <div id="sm-user-name">User</div>
    </div>
    <div style="display:flex;gap:4px">
      <div class="sm-icon-btn" onclick="lockDesktop()" title="Lock">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <div class="sm-icon-btn" onclick="Auth.logout()" title="Sign out">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </div>
      <div class="sm-icon-btn" onclick="showPowerMenu(event)" title="Power">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- QUICK SETTINGS -->
<div id="quick-settings" onclick="event.stopPropagation()">
  <div class="qs-grid" id="qs-grid"></div>
  <div class="qs-slider">
    <label>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Brightness
    </label>
    <input type="range" min="0" max="100" value="80">
  </div>
  <div class="qs-slider">
    <label>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg>
      Volume
    </label>
    <input type="range" min="0" max="100" value="60">
  </div>
  <div class="qs-sep"></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="qs-avatar" style="width:36px;height:36px;border-radius:50%;background:#0078d4;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff">U</div>
    <div style="flex:1">
      <div style="font-size:13px" id="qs-name">User</div>
      <div style="font-size:12px;color:var(--text-muted)" id="qs-email"></div>
    </div>
    <div class="tb-action" onclick="openSettings('accounts')">Account</div>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div id="notif-container"></div>

<script>
// Inline icons needed before scripts load
const NAV_ICONS_INLINE = {
  search: `<path d="M15 15l-3.5-3.5M11 7a4 4 0 110 8 4 4 0 010-8z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>`
};
</script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/icons.js"></script>
<script src="js/wm.js"></script>
<script src="js/apps.js"></script>
<script>
// ============================================================
// DESKTOP INIT
// ============================================================

let _currentUser = null;
window._currentUser = null;

async function initDesktop() {
  // Auth guard
  const user = await Auth.requireAuth();
  if (!user) return;
  _currentUser = user;
  window._currentUser = user;

  // Update UI with user info
  document.getElementById('sm-user-avatar').textContent    = user.avatarInitial;
  document.getElementById('sm-user-avatar').style.background = user.avatarColor;
  document.getElementById('sm-user-name').textContent      = user.displayName;
  document.getElementById('qs-avatar').textContent         = user.avatarInitial;
  document.getElementById('qs-avatar').style.background    = user.avatarColor;
  document.getElementById('qs-name').textContent           = user.displayName;
  document.getElementById('qs-email').textContent          = user.email || user.username;

  // Apply saved preferences
  await applyUserPreferences(user);

  // Build desktop icons
  buildDesktopIcons();

  // Build start menu
  buildStartMenu();

  // Build quick settings tiles
  buildQSTiles();

  // Clock
  updateClock();
  setInterval(updateClock, 1000);

  // Bind account actions
  bindAccountActions();

  // Welcome notification
  setTimeout(() => notify('Welcome back', `Signed in as ${user.displayName}`, 'user'), 800);
  setTimeout(() => notify('Windows Update', 'Your device is up to date', 'settings'), 4500);
}

// ── Desktop Icons ─────────────────────────────────────────────────────────────
function buildDesktopIcons() {
  const items = [
    { id:'thispc',   label:'This PC',       icon:'thispc',   app:null },
    { id:'recycle',  label:'Recycle Bin',   icon:'recycle',  app:null },
    { id:'folder',   label:'File Explorer', icon:'folder',   app:'explorer' },
    { id:'browser',  label:'Edge',          icon:'edge',     app:'browser' },
    { id:'notepad',  label:'Notepad',       icon:'notepad',  app:'notepad' },
  ];
  const cont = document.getElementById('desktop-icons');
  cont.innerHTML = '';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.innerHTML = `${icon(item.icon, 40)}<span>${item.label}</span>`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
      el.classList.add('selected');
    });
    el.addEventListener('dblclick', () => { if (item.app) WM.open(item.app); });
    el.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      showIconCtxMenu(e, item);
    });
    cont.appendChild(el);
  });
}

function showIconCtxMenu(e, item) {
  closeAllMenus();
  const m = document.createElement('div');
  m.className = 'ctx-menu';
  m.style.cssText = `left:${Math.min(e.clientX,window.innerWidth-220)}px;top:${Math.min(e.clientY,window.innerHeight-140)}px`;
  m.innerHTML = `
    ${item.app ? `<div class="ctx-item" onclick="WM.open('${item.app}');closeAllMenus()"><svg viewBox="0 0 24 24">${NAV_ICONS.new}</svg>Open</div>` : ''}
    <div class="ctx-item" onclick="closeAllMenus()"><svg viewBox="0 0 24 24">${NAV_ICONS.copy}</svg>Copy</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="closeAllMenus()"><svg viewBox="0 0 24 24">${NAV_ICONS.rename}</svg>Rename</div>
    <div class="ctx-item danger" onclick="closeAllMenus()"><svg viewBox="0 0 24 24">${NAV_ICONS.delete}</svg>Delete</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="closeAllMenus()"><svg viewBox="0 0 24 24">${NAV_ICONS.share}</svg>Properties</div>
  `;
  document.body.appendChild(m);
}

// ── Start Menu ────────────────────────────────────────────────────────────────
const PINNED = ['explorer','browser','notepad','terminal','settings','calendar','photos','mail','store','spotify'];
const REC = [
  { id:'notepad',  label:'notes.txt',  sub:'Recently opened' },
  { id:'terminal', label:'Terminal',   sub:'Recently used' },
  { id:'settings', label:'Settings',   sub:'Yesterday' },
  { id:'browser',  label:'Edge',       sub:'Frequently used' },
];

function buildStartMenu() {
  const grid = document.getElementById('sm-pinned-grid');
  grid.innerHTML = PINNED.map(id => {
    const def  = WM.APPS?.[id] || { title: id, icon: id };
    const name = def ? def.title : id.charAt(0).toUpperCase() + id.slice(1);
    return `<div class="pinned-app" onclick="WM.open('${id}');closeAllMenus()">
      <div style="width:32px;height:32px">${icon(id === 'store' ? 'store' : id === 'spotify' ? 'spotify' : (def?.icon || id), 32)}</div>
      <span>${name}</span>
    </div>`;
  }).join('');

  const recList = document.getElementById('sm-rec-list');
  recList.innerHTML = REC.map(r => `
    <div class="rec-item" onclick="WM.open('${r.id}');closeAllMenus()">
      <div style="width:24px;height:24px">${icon(r.id, 24)}</div>
      <div><div class="rec-item-name">${r.label}</div><div class="rec-item-sub">${r.sub}</div></div>
    </div>`).join('');
}

function filterStartApps(q) {
  document.querySelectorAll('.pinned-app').forEach(el => {
    el.style.display = el.querySelector('span').textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ── Quick Settings Tiles ──────────────────────────────────────────────────────
function buildQSTiles() {
  const tiles = [
    { label:'Wi-Fi',      on:true,  svg:`<path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>` },
    { label:'Bluetooth',  on:false, svg:`<polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5" fill="none" stroke="currentColor" stroke-width="1.5"/>` },
    { label:'Airplane',   on:false, svg:`<path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" fill="none" stroke="currentColor" stroke-width="1.5"/>` },
    { label:'Night Light',on:true,  svg:`<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="1.5"/>` },
    { label:'Focus',      on:false, svg:`<circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2" fill="currentColor"/>` },
    { label:'VPN',        on:false, svg:`<rect x="2" y="7" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M16 7V5a4 4 0 00-8 0v2" fill="none" stroke="currentColor" stroke-width="1.5"/>` },
  ];
  const grid = document.getElementById('qs-grid');
  grid.innerHTML = tiles.map(t => `
    <div class="qs-tile ${t.on ? 'on' : ''}" onclick="this.classList.toggle('on')">
      <svg viewBox="0 0 24 24" width="18" height="18">${t.svg}</svg>
      <span>${t.label}</span>
    </div>`).join('');
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('tb-clock');
  if (!el) return;
  const now  = new Date();
  el.innerHTML = `${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}<br>${now.toLocaleDateString([],{month:'numeric',day:'numeric',year:'numeric'})}`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function openSettings(page) {
  closeAllMenus();
  WM.open('settings', { page });
}

function lockDesktop() {
  closeAllMenus();
  Auth.logout();
}

function showPowerMenu(e) {
  e.stopPropagation();
  closeAllMenus();
  const m = document.createElement('div');
  m.className = 'ctx-menu';
  m.style.cssText = `right:16px;bottom:60px;left:auto`;
  m.innerHTML = `
    <div class="ctx-item" onclick="Auth.logout()">Sign out</div>
    <div class="ctx-item" onclick="closeAllMenus()">Sleep</div>
    <div class="ctx-item" onclick="closeAllMenus()">Restart</div>
    <div class="ctx-item" onclick="closeAllMenus()">Shut down</div>
  `;
  document.body.appendChild(m);
}

function showNotifCenter() {
  notify('Notification Center', 'All caught up! No new notifications.', 'settings');
}

// ── Start ─────────────────────────────────────────────────────────────────────
initDesktop();
</script>
</body>
</html>
