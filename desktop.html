<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Windows 11</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- DESKTOP -->
<div id="desktop" oncontextmenu="deskCtx(event)" onclick="closeAll(event)">
  <div id="desktop-bg" style="position:absolute;inset:0;background:linear-gradient(135deg,#0a1628,#1a3a5c 30%,#0d47a1 60%,#1565c0 80%,#283593)"></div>
  <div id="desk-icons"></div>
</div>

<!-- TASKBAR -->
<div id="taskbar" onclick="event.stopPropagation()">
  <div id="tb-left"></div>
  <div id="tb-center">
    <!-- Start -->
    <div id="start-btn" onclick="toggleStart(event)" title="Start">
      <svg viewBox="0 0 20 20" width="18" height="18">
        <rect x="0" y="0" width="9" height="9" fill="#f35325"/>
        <rect x="11" y="0" width="9" height="9" fill="#81bc06"/>
        <rect x="0" y="11" width="9" height="9" fill="#05a6f0"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffba08"/>
      </svg>
    </div>
    <!-- Search pill -->
    <div onclick="WM.open('browser')" style="height:34px;padding:0 12px;background:rgba(255,255,255,.07);border-radius:17px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .15s" onmouseenter="this.style.background='rgba(255,255,255,.11)'" onmouseleave="this.style.background='rgba(255,255,255,.07)'">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span style="font-size:12px;color:rgba(255,255,255,.4)">Search</span>
    </div>
    <!-- App buttons -->
    <div id="tb-apps"></div>
  </div>

  <div id="tb-right">
    <!-- WIFI button -->
    <div class="tray-btn" onclick="togglePanel('wifi-panel',event)" title="Network">
      <img src="https://img.icons8.com/fluency/16/wi-fi.png" width="16" height="16" alt="wifi" style="filter:brightness(0) invert(1);opacity:.8">
    </div>
    <!-- Volume button -->
    <div class="tray-btn" onclick="togglePanel('vol-panel',event)" title="Volume">
      <img id="vol-tray-ico" src="https://img.icons8.com/fluency/16/speaker.png" width="16" height="16" alt="volume" style="filter:brightness(0) invert(1);opacity:.8">
    </div>
    <!-- Battery button -->
    <div class="tray-btn" onclick="togglePanel('bat-panel',event)" title="Battery" id="bat-tray">
      <img src="https://img.icons8.com/fluency/16/battery.png" width="16" height="16" alt="battery" style="filter:brightness(0) invert(1);opacity:.8">
    </div>
    <!-- Clock -->
    <div id="tb-clock" class="tray-btn" onclick="WM.open('calendar')" style="flex-direction:column;align-items:flex-end;font-size:11px;line-height:1.4;gap:0;min-width:52px"></div>
    <!-- Notif -->
    <div class="tray-btn" onclick="notify('Notification Center','All caught up — no new notifications','settings')" title="Notifications">
      <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
        <path d="M8 1a5 5 0 00-5 5v3l-1 2h12l-1-2V6a5 5 0 00-5-5zm-1.5 13a1.5 1.5 0 003 0h-3z"/>
      </svg>
    </div>
  </div>
</div>

<!-- START MENU -->
<div id="start-menu" onclick="event.stopPropagation()">
  <div class="sm-search">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="sm-search" placeholder="Search apps, files, settings…" oninput="filterApps(this.value)">
  </div>
  <div class="sm-sec">
    <div class="sm-sec-title">Pinned</div>
    <div id="sm-grid"></div>
  </div>
  <div class="sm-sec" style="flex:1;overflow:hidden">
    <div class="sm-sec-title">Recommended</div>
    <div id="sm-rec-grid"></div>
  </div>
  <div id="sm-footer">
    <div id="sm-user-row" onclick="WM.open('settings',{page:'accounts'});closeAll()">
      <div id="sm-av" style="background:#0078d4">U</div>
      <span id="sm-uname" style="font-size:13px">User</span>
    </div>
    <div style="display:flex;gap:2px">
      <div class="sm-foot-btn" onclick="Auth.logout()" title="Sign out">🔌</div>
      <div class="sm-foot-btn" onclick="Auth.logout()" title="Lock">🔒</div>
      <div class="sm-foot-btn" onclick="showPowerMenu(event)" title="Power">⏻</div>
    </div>
  </div>
</div>

<!-- TRAY PANELS -->
<!-- Wi-Fi Panel -->
<div id="wifi-panel" class="tray-panel" onclick="event.stopPropagation()">
  <div class="panel-title">🌐 Network & Internet</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <span style="font-size:13px">Wi-Fi</span>
    <div class="toggle on" id="wifi-tog" onclick="this.classList.toggle('on');updateWifiList()"></div>
  </div>
  <div id="wifi-list"></div>
  <div class="panel-sep"></div>
  <div onclick="WM.open('settings',{page:'network'});closeAll()" style="font-size:12px;color:var(--ac);cursor:pointer;text-align:center">Network settings →</div>
</div>

<!-- Volume Panel -->
<div id="vol-panel" class="tray-panel" onclick="event.stopPropagation()">
  <div class="panel-title">🔊 Volume</div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <span style="font-size:20px" id="vol-ico">🔊</span>
    <input type="range" min="0" max="100" value="65" id="vol-slider" style="flex:1;accent-color:var(--ac)" oninput="updateVol(this.value)">
    <span id="vol-val" style="font-size:13px;color:var(--tx2);width:28px;text-align:right">65</span>
  </div>
  <div class="panel-sep"></div>
  <div class="panel-title" style="font-size:13px;margin-bottom:10px">Microphone</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:18px">🎤</span>
    <input type="range" min="0" max="100" value="80" style="flex:1;accent-color:var(--ac)">
  </div>
  <div class="panel-sep"></div>
  <div onclick="WM.open('settings')" style="font-size:12px;color:var(--ac);cursor:pointer;text-align:center">Sound settings →</div>
</div>

<!-- Battery Panel -->
<div id="bat-panel" class="tray-panel" onclick="event.stopPropagation()">
  <div class="panel-title">🔋 Battery</div>
  <div class="bat-info">
    <div class="bat-pct" id="bat-pct">78%</div>
    <div class="bat-status" id="bat-stat">Plugged in, charging</div>
  </div>
  <div class="bat-bar"><div class="bat-fill" id="bat-fill" style="width:78%"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:14px">
    <span>Est. 5h 20m remaining</span>
    <span id="bat-mode">Balanced</span>
  </div>
  <div style="font-size:12px;color:var(--tx3);margin-bottom:8px">Power mode</div>
  <div style="display:flex;gap:6px">
    <div onclick="setBatMode('Saver')" class="sbtn ghost" style="flex:1;height:28px;font-size:12px;display:flex;align-items:center;justify-content:center">🪫 Saver</div>
    <div onclick="setBatMode('Balanced')" class="sbtn" style="flex:1;height:28px;font-size:12px;display:flex;align-items:center;justify-content:center">⚖️ Balanced</div>
    <div onclick="setBatMode('Performance')" class="sbtn ghost" style="flex:1;height:28px;font-size:12px;display:flex;align-items:center;justify-content:center">⚡ Perf</div>
  </div>
  <div class="panel-sep"></div>
  <div onclick="WM.open('settings')" style="font-size:12px;color:var(--ac);cursor:pointer;text-align:center">Power settings →</div>
</div>

<!-- NOTIFICATIONS -->
<div id="notif-area"></div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/icons.js"></script>
<script src="js/wm.js"></script>
<script src="js/apps.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// DESKTOP INIT
// ═══════════════════════════════════════════════════════════════
window.CUR_USER = null;

const PINNED_APPS = ['explorer','browser','notepad','calculator','paint','music','terminal','settings','calendar','photos','mail'];
const ACCENT_COLORS = ['#0078d4','#0099bc','#60cdff','#8764b8','#ef6950','#e74856','#038387','#107c10','#ca5010'];
const AVATAR_COLORS = ['#0078d4','#8764b8','#ef6950','#038387','#107c10','#ca5010','#e3008c','#004e8c'];
const WALLPAPERS = [
  {id:'bloom',label:'Bloom',css:'linear-gradient(135deg,#0a1628,#1a3a5c 30%,#0d47a1 60%,#1565c0 80%,#283593)'},
  {id:'sunrise',label:'Sunrise',css:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483,#e94560)'},
  {id:'forest',label:'Forest',css:'linear-gradient(135deg,#0d1b0d,#1a3d1a,#2d6a2d,#1a3d1a,#0d1b0d)'},
  {id:'sunset',label:'Sunset',css:'linear-gradient(135deg,#1a0a00,#4a1500,#9c3700,#e05800,#f59b00)'},
  {id:'night',label:'Night',css:'radial-gradient(ellipse at center,#0a0a2e,#000010)'},
  {id:'galaxy',label:'Galaxy',css:'linear-gradient(135deg,#0d0d2b,#2d0a4e,#5a0a82,#8b0dc0,#c020e0)'},
];

async function initDesktop() {
  const user = await Auth.requireAuth();
  if (!user) return;
  window.CUR_USER = user;

  // UI
  document.getElementById('sm-av').textContent = user.avatarInitial;
  document.getElementById('sm-av').style.background = user.avatarColor;
  document.getElementById('sm-uname').textContent = user.displayName;

  // Saved wallpaper & accent
  if (user.wallpaper) {
    const wp = WALLPAPERS.find(w=>w.id===user.wallpaper);
    if (wp) document.getElementById('desktop-bg').style.background = wp.css;
  }
  if (user.accentColor) {
    document.documentElement.style.setProperty('--ac', user.accentColor);
  }

  buildDesktopIcons();
  buildStartMenu();
  buildWifiList();
  tickClock();
  setInterval(tickClock, 1000);
  bindAccountActions();

  setTimeout(()=>notify('Welcome back', `Signed in as ${user.displayName}`, 'user'), 700);
  setTimeout(()=>notify('Windows Update', 'Your device is up to date ✓', 'settings'), 4000);
}

// ── Desktop Icons ─────────────────────────────────────────────
function buildDesktopIcons() {
  const items = [
    {id:'thispc',label:'This PC',icon:'thispc',app:null},
    {id:'recycle',label:'Recycle Bin',icon:'recycle',app:null},
    {id:'explorer',label:'File Explorer',icon:'folder',app:'explorer'},
    {id:'browser',label:'Edge',icon:'edge',app:'browser'},
  ];
  const c = document.getElementById('desk-icons');
  c.innerHTML = '';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'desk-icon';
    el.innerHTML = `${icon(item.icon,40)}<span>${item.label}</span>`;
    el.onclick = e => { e.stopPropagation(); document.querySelectorAll('.desk-icon').forEach(d=>d.classList.remove('sel')); el.classList.add('sel'); };
    el.ondblclick = () => { if(item.app) WM.open(item.app); };
    el.oncontextmenu = e => { e.preventDefault(); e.stopPropagation(); iconCtx(e,item); };
    c.appendChild(el);
  });
}

function iconCtx(e, item) {
  closeAll();
  const m = document.createElement('div'); m.className='ctx';
  m.style.cssText=`left:${Math.min(e.clientX,innerWidth-220)}px;top:${Math.min(e.clientY,innerHeight-160)}px`;
  m.innerHTML=`
    ${item.app?`<div class="ctx-row" onclick="WM.open('${item.app}');closeAll()">📂 Open</div>`:''}
    <div class="ctx-row" onclick="closeAll()">📋 Copy</div>
    <div class="ctx-sep"></div>
    <div class="ctx-row" onclick="closeAll()">✏️ Rename</div>
    <div class="ctx-row danger" onclick="closeAll()">🗑 Delete</div>
    <div class="ctx-sep"></div>
    <div class="ctx-row" onclick="closeAll()">⚙️ Properties</div>`;
  document.body.appendChild(m);
}

// ── Start Menu ────────────────────────────────────────────────
function buildStartMenu() {
  const grid = document.getElementById('sm-grid');
  grid.innerHTML = PINNED_APPS.map(id => {
    const def = APP_REGISTRY[id];
    if (!def) return '';
    return `<div class="sm-app" onclick="WM.open('${id}');closeAll()">
      <div style="width:32px;height:32px">${icon(def.icon,32)}</div>
      <span>${def.title}</span>
    </div>`;
  }).join('');

  const rec = document.getElementById('sm-rec-grid');
  const recItems = [
    {id:'notepad',label:'notes.txt',sub:'Recently opened'},
    {id:'terminal',label:'Terminal',sub:'Recently used'},
    {id:'calculator',label:'Calculator',sub:'Recently used'},
    {id:'paint',label:'Paint',sub:'Recently opened'},
  ];
  rec.innerHTML = recItems.map(r => {
    const def = APP_REGISTRY[r.id];
    if (!def) return '';
    return `<div class="sm-rec" onclick="WM.open('${r.id}');closeAll()">
      <div style="width:24px;height:24px">${icon(def.icon,24)}</div>
      <div><div class="rt">${r.label}</div><div class="rs">${r.sub}</div></div>
    </div>`;
  }).join('');
}

function filterApps(q) {
  document.querySelectorAll('.sm-app').forEach(el => {
    el.style.display = el.querySelector('span').textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ── Clock ─────────────────────────────────────────────────────
function tickClock() {
  const el = document.getElementById('tb-clock'); if (!el) return;
  const d = new Date();
  el.innerHTML = `${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}<br>${d.toLocaleDateString([],{month:'numeric',day:'numeric',year:'numeric'})}`;
}

// ── Tray Panel toggle ─────────────────────────────────────────
function togglePanel(id, e) {
  if (e) e.stopPropagation();
  const panels = ['wifi-panel','vol-panel','bat-panel'];
  panels.forEach(p => {
    if (p !== id) document.getElementById(p).classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
  closePanel('start-menu');
  document.getElementById('start-btn').classList.remove('on');
}

function closePanel(id) { document.getElementById(id)?.classList.remove('open'); }

function closeAll(e) {
  if (!e?.target.closest('#start-menu,#start-btn')) { closePanel('start-menu'); document.getElementById('start-btn').classList.remove('on'); }
  if (!e?.target.closest('#wifi-panel,.tray-btn')) closePanel('wifi-panel');
  if (!e?.target.closest('#vol-panel,.tray-btn')) closePanel('vol-panel');
  if (!e?.target.closest('#bat-panel,.tray-btn')) closePanel('bat-panel');
  document.querySelectorAll('.ctx').forEach(m=>m.remove());
  document.querySelectorAll('.desk-icon').forEach(d=>d.classList.remove('sel'));
}

// ── Wi-Fi Panel ───────────────────────────────────────────────
const wifiNetworks = [
  {name:'Home Network',bars:4,secured:true,connected:true},
  {name:'NETGEAR_5G',bars:3,secured:true,connected:false},
  {name:'iPhone Hotspot',bars:2,secured:false,connected:false},
  {name:'CoffeeShop_Free',bars:3,secured:false,connected:false},
  {name:'Neighbors WiFi',bars:1,secured:true,connected:false},
];
function buildWifiList() {
  const wifiOn = document.getElementById('wifi-tog').classList.contains('on');
  const c = document.getElementById('wifi-list');
  if (!wifiOn) { c.innerHTML='<div style="font-size:13px;color:var(--tx3);text-align:center;padding:12px">Wi-Fi is off</div>'; return; }
  c.innerHTML = wifiNetworks.map(n=>`
    <div class="wifi-net" onclick="connectWifi('${n.name}',this)">
      <div class="wifi-dot" style="background:${n.connected?'var(--ac)':'transparent'};border:2px solid ${n.connected?'var(--ac)':'var(--tx3)'}"></div>
      <div class="wifi-name" style="font-size:13px">${n.name} ${n.connected?'<span style="font-size:11px;color:var(--acl)">✓ Connected</span>':''}</div>
      <div class="wifi-str" style="font-size:11px">${'▂▄▆█'.slice(0,n.bars)} ${n.secured?'🔒':''}</div>
    </div>`).join('');
}
function updateWifiList() { setTimeout(buildWifiList, 50); }
window.connectWifi = (name, el) => {
  wifiNetworks.forEach(n=>n.connected=n.name===name);
  buildWifiList();
  notify('Network', `Connected to ${name}`, 'wifi');
};

// ── Volume Panel ──────────────────────────────────────────────
window.updateVol = v => {
  document.getElementById('vol-val').textContent = v;
  document.getElementById('vol-ico').textContent = v==0?'🔇':v<40?'🔉':'🔊';
  const slug = v==0 ? 'mute' : v<40 ? 'medium-volume' : 'speaker';
  const ti = document.getElementById('vol-tray-ico');
  if (ti) ti.src = `https://img.icons8.com/fluency/16/${slug}.png`;
};

// ── Battery Panel ─────────────────────────────────────────────
window.setBatMode = mode => {
  document.getElementById('bat-mode').textContent = mode;
  notify('Power', `Power mode: ${mode}`, 'settings');
};

// ── Power menu ────────────────────────────────────────────────
window.showPowerMenu = e => {
  e.stopPropagation(); closeAll();
  const m=document.createElement('div'); m.className='ctx';
  m.style.cssText=`right:10px;bottom:56px;left:auto`;
  m.innerHTML=`
    <div class="ctx-row" onclick="Auth.logout()">🚪 Sign out</div>
    <div class="ctx-row" onclick="closeAll()">💤 Sleep</div>
    <div class="ctx-row" onclick="closeAll()">🔄 Restart</div>
    <div class="ctx-row" onclick="closeAll()">⏻ Shut down</div>`;
  document.body.appendChild(m);
};

// ── Overrides for WM that need DOM access ─────────────────────
window.toggleStart = e => {
  if (e) e.stopPropagation();
  const sm=document.getElementById('start-menu'), sb=document.getElementById('start-btn');
  const open=sm.classList.toggle('open');
  sb.classList.toggle('on',open);
  if(open){ ['wifi-panel','vol-panel','bat-panel'].forEach(p=>closePanel(p)); setTimeout(()=>document.getElementById('sm-search')?.focus(),100); }
};

// ── Account action bindings (used in Settings app) ────────────
function bindAccountActions() {
  const user = window.CUR_USER;
  if (!user) return;

  window.applyWP = (id, css) => {
    document.getElementById('desktop-bg').style.background = css;
    DB.updateAccount(user.id, {wallpaper:id});
    notify('Settings','Wallpaper updated','settings');
  };
  window.applyAccent = c => {
    document.documentElement.style.setProperty('--ac', c);
    DB.updateAccount(user.id, {accentColor:c});
    notify('Settings','Accent color updated','settings');
  };
  window.acctSaveName = async () => {
    const v=document.getElementById('set-dname')?.value.trim(); if(!v) return;
    await DB.updateAccount(user.id,{displayName:v,avatarInitial:v[0].toUpperCase()});
    window.CUR_USER.displayName=v; window.CUR_USER.avatarInitial=v[0].toUpperCase();
    document.getElementById('sm-uname').textContent=v;
    document.getElementById('sm-av').textContent=v[0].toUpperCase();
    notify('Settings','Name updated','settings');
  };
  window.acctSaveEmail = async () => {
    const v=document.getElementById('set-email')?.value.trim()??'';
    await DB.updateAccount(user.id,{email:v}); window.CUR_USER.email=v;
    notify('Settings','Email updated','settings');
  };
  window.acctChangePw = async () => {
    const o=document.getElementById('set-pw-old')?.value,n=document.getElementById('set-pw-new')?.value,n2=document.getElementById('set-pw-new2')?.value,er=document.getElementById('set-pw-err');
    try{ if(n!==n2) throw new Error("Passwords don't match"); await Auth.changePassword(user.id,o,n); if(er)er.textContent=''; notify('Settings','Password changed','settings'); ['set-pw-old','set-pw-new','set-pw-new2'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});}
    catch(e){if(er)er.textContent=e.message;}
  };
  window.acctSetPin = async () => {
    const p=document.getElementById('set-pin')?.value, er=document.getElementById('set-pin-err');
    try{ await Auth.setPin(user.id,p||''); window.CUR_USER.pin=p||null; if(er)er.textContent=''; notify('Settings',p?'PIN set':'PIN removed','settings'); }
    catch(e){ if(er)er.textContent=e.message; }
  };
  window.acctPickColor = async c => {
    await DB.updateAccount(user.id,{avatarColor:c});
    window.CUR_USER.avatarColor=c;
    document.getElementById('sm-av').style.background=c;
    document.querySelectorAll('.av-swatch').forEach(s=>s.style.outline=s.dataset.c===c?'2px solid #fff':'none');
    notify('Settings','Avatar color updated','settings');
  };
  window.acctAddUser = () => { document.getElementById('add-user-panel').style.display=''; };
  window.acctCreateUser = async () => {
    const n=document.getElementById('nu-name')?.value.trim(),u=document.getElementById('nu-user')?.value.trim(),p=document.getElementById('nu-pw')?.value,er=document.getElementById('nu-err');
    try{ await Auth.createAccount(n,u,p,{isAdmin:false,avatarColor:AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)]}); if(er)er.textContent=''; notify('Settings',`Account created: ${n}`,'user'); window.setPage?.('accounts'); }
    catch(e){ if(er)er.textContent=e.message; }
  };
  window.acctDeleteUser = async (id,name) => {
    if(!confirm(`Remove "${name}"? Cannot be undone.`)) return;
    await DB.deleteAccount(id); await DB.deleteUserSessions(id);
    notify('Settings',`Account removed: ${name}`,'settings');
    window.setPage?.('accounts');
  };
  window.acctSwitch = async uid => { localStorage.setItem('w11_lock_user',uid); await Auth.logout(); };
}

initDesktop();
</script>
<!-- Icons by Icons8 — https://icons8.com/icons/set/fluent -->
</body>
</html>
